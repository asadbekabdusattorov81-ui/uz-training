<!doctype html>
<html lang="uz">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>GeoGAT Akademiya — Modul</title>
  <link rel="stylesheet" href="css/style.css" />
  <style>
    /* ── Course page styles ── */
    .cheroInner {
      display: flex; align-items: center; gap: 22px;
      padding: 32px 28px; border-radius: 14px;
      margin-bottom: 28px;
    }
    .cheroEmoji { font-size: 56px; flex-shrink: 0; }
    .cheroText  { color: #fff; }
    .cheroBadge {
      display: inline-block; font-size: 11px; font-weight: 700;
      padding: 3px 12px; border-radius: 20px; color: #fff;
      text-transform: uppercase; letter-spacing: .4px; margin-bottom: 8px;
    }
    .cheroText h1 { font-size: 26px; font-weight: 700; margin-bottom: 6px; }
    .cheroMeta    { font-size: 13px; opacity: .85; }

    /* Layout */
    .courseLayout {
      display: grid;
      grid-template-columns: 240px 1fr;
      gap: 24px;
      margin-top: 24px;
      margin-bottom: 48px;
    }

    /* Sidebar */
    .courseSide { display: flex; flex-direction: column; gap: 16px; }
    .sideBox {
      background: #fff; border: 1px solid #e0e6ef;
      border-radius: 12px; padding: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    }
    .sideTitle {
      font-size: 11px; font-weight: 700; text-transform: uppercase;
      letter-spacing: .6px; color: #888; margin-bottom: 10px;
    }
    .sideNavItem {
      display: block; padding: 9px 12px; border-radius: 8px;
      font-size: 13px; font-weight: 500; color: #444;
      text-decoration: none; transition: background .15s, color .15s;
      margin-bottom: 2px;
    }
    .sideNavItem:hover  { background: #f0f4fb; color: #1a6fc4; }
    .sideNavItem.active { background: #eff3ff; color: #3b6ef8; font-weight: 700; }

    /* File list */
    .fileItem {
      display: flex; align-items: center; gap: 8px;
      padding: 8px 10px; border-radius: 8px; margin-bottom: 4px;
      background: #f8f9fc; border: 1px solid #e4e8f0;
      text-decoration: none; color: #333; font-size: 13px;
      transition: background .15s;
    }
    .fileItem:hover { background: #e8f0fb; color: #1a6fc4; }
    .fileItemIcon { font-size: 18px; flex-shrink: 0; }
    .fileItemName { flex: 1; font-weight: 500; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .fileItemExt  { font-size: 10px; color: #999; text-transform: uppercase; flex-shrink: 0; }
    .emptyFile    { font-size: 12px; color: #aaa; text-align: center; padding: 14px 0; }

    /* Content box */
    .contentBox {
      background: #fff; border: 1px solid #e0e6ef;
      border-radius: 12px; padding: 28px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
      min-height: 300px;
    }

    /* Section blocks */
    .secBlock { max-width: 680px; }
    .secTitle  { font-size: 20px; font-weight: 700; margin-bottom: 20px; color: #1a1a2e; }
    .secDesc   { color: #666; font-size: 14px; line-height: 1.6; }

    .fieldBlock  { margin-bottom: 18px; }
    .fieldLabel  { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .6px; color: #666; margin-bottom: 6px; }
    .fieldVal    { font-size: 14px; color: #333; line-height: 1.6; background: #f8f9fc; border: 1px solid #e4e8f0; border-radius: 8px; padding: 10px 14px; }

    .theoryList  { list-style: none; padding: 0; margin-bottom: 14px; }
    .theoryList li {
      padding: 9px 14px 9px 36px; margin-bottom: 6px;
      background: #f8f9fc; border: 1px solid #e4e8f0; border-radius: 8px;
      font-size: 14px; color: #333; position: relative;
    }
    .theoryList li::before {
      content: "▸"; position: absolute; left: 12px; color: #3b6ef8;
    }
    .theoryNote {
      background: #eff3ff; border-left: 3px solid #3b6ef8;
      border-radius: 0 8px 8px 0; padding: 10px 14px;
      font-size: 13px; color: #444; margin-top: 8px;
    }

    .videoWrap    { margin-bottom: 20px; }
    .commentsSection { margin-top: 24px; }
    .commentsTitle{ font-size: 14px; font-weight: 700; margin-bottom: 10px; color: #333; }
    .commentCard  {
      background: #f8f9fc; border: 1px solid #e4e8f0; border-radius: 8px;
      padding: 10px 14px; margin-bottom: 8px;
    }
    .commentText  { font-size: 14px; color: #333; }
    .commentMeta  { font-size: 11px; color: #aaa; margin-top: 4px; }

    .stepsList    { display: flex; flex-direction: column; gap: 8px; margin-bottom: 16px; }
    .stepItem     {
      display: flex; align-items: flex-start; gap: 12px;
      background: #f8f9fc; border: 1px solid #e4e8f0; border-radius: 8px;
      padding: 10px 14px; font-size: 14px; color: #333;
    }
    .stepNum      {
      min-width: 26px; height: 26px; border-radius: 50%;
      background: #3b6ef8; color: #fff; font-size: 12px; font-weight: 700;
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }
    .highlightBox {
      background: #f0fdf4; border: 1px solid rgba(22,163,74,.25);
      border-radius: 8px; padding: 12px 16px;
      font-size: 14px; color: #15803d; font-weight: 500;
    }

    .yakunText  { font-size: 15px; color: #333; line-height: 1.7; margin-bottom: 16px; }
    .yakunBold  {
      font-size: 18px; font-weight: 700; color: #1a6fc4;
      background: #eff3ff; border-radius: 10px; padding: 14px 18px;
    }

    .loadingState, .emptyState {
      text-align: center; padding: 48px; color: #aaa; font-size: 15px;
    }

    /* Simple site header */
    .siteHeader { background: #3a3a3a; padding: 14px 0; }
    .headerRow  { display: flex; align-items: center; justify-content: space-between; }
    .logoText   { font-size: 16px; font-weight: 700; color: #fff; text-decoration: none; }
    .nav        { display: flex; gap: 18px; }
    .nav a      { color: rgba(255,255,255,.85); font-size: 14px; text-decoration: none; }
    .nav a:hover, .nav a.active { color: #fff; text-decoration: underline; }
    .siteFooter { background: #2f2f2f; color: rgba(255,255,255,.75); text-align: center; padding: 16px; font-size: 13px; margin-top: 40px; }

    @media (max-width: 768px) {
      .courseLayout { grid-template-columns: 1fr; }
      .cheroInner   { flex-direction: column; text-align: center; }
    }
  </style>
</head>
<body>

<header class="siteHeader">
  <div class="wrap headerRow">
    <a class="logoText" href="index.html">GeoGAT Akademiya</a>
    <nav class="nav">
      <a href="index.html">Bosh sahifa</a>
      <a href="courses.html" class="active">Kurslar</a>
      <a href="about.html">Fan haqida</a>
    </nav>
  </div>
</header>

<main class="wrap">

  <section id="courseHero"></section>

  <section class="courseLayout">

    <aside class="courseSide">
      <div class="sideBox">
        <div class="sideTitle">Bo'limlar</div>
        <nav id="sectionNav"></nav>
      </div>

      <div class="sideBox">
        <div class="sideTitle">Modul fayllari</div>
        <div id="fileList"></div>
      </div>
    </aside>

    <article class="courseContent">
      <div class="contentBox" id="sectionContent">
        <div class="loadingState">⏳ Yuklanmoqda...</div>
      </div>
    </article>

  </section>

</main>

<footer class="siteFooter">
  © <span id="y"></span> GeoGAT Akademiya
</footer>

<script src="tests_data.js"></script>
<script type="module" src="js/app.js"></script>
<script type="module">
  // app.js yuklangandan keyin chaqiriladi
  // DOMContentLoaded da xavfsiz chaqirish
  document.addEventListener("DOMContentLoaded", () => {
    // kichik kechikish bilan — app.js ning module init uchun
    setTimeout(() => {
      if (typeof window.loadCoursePage === "function") {
        window.loadCoursePage();
      } else {
        // fallback: app.js module o'zi export qilganda
        document.dispatchEvent(new Event("appReady"));
      }
    }, 100);
  });
</script>

</body>
</html>
