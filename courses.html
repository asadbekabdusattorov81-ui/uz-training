<!doctype html>
<html lang="uz">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>GeoGAT Akademiya — Kurslar</title>
  <link rel="stylesheet" href="css/style.css" />
  <style>
    /* Site header */
    .siteHeader { background: #3a3a3a; padding: 14px 0; }
    .headerRow  { display: flex; align-items: center; justify-content: space-between; }
    .logoText   { font-size: 16px; font-weight: 700; color: #fff; text-decoration: none; }
    .nav        { display: flex; gap: 18px; }
    .nav a      { color: rgba(255,255,255,.85); font-size: 14px; text-decoration: none; }
    .nav a:hover, .nav a.active { color: #fff; text-decoration: underline; }
    .siteFooter { background: #2f2f2f; color: rgba(255,255,255,.75); text-align: center; padding: 16px; font-size: 13px; margin-top: 40px; }

    /* Page head */
    .pageHead { padding: 36px 0 24px; }
    .pageHead h1 { font-size: 28px; font-weight: 700; color: #1a1a2e; margin-bottom: 8px; }
    .pageHead p  { font-size: 14px; color: #666; line-height: 1.6; max-width: 680px; }

    /* Search toolbar */
    .toolRow { display: flex; gap: 10px; margin-bottom: 28px; flex-wrap: wrap; }
    .toolInput {
      flex: 1; min-width: 220px; height: 42px; padding: 0 14px;
      border: 1.5px solid #e0e6ef; border-radius: 8px;
      font-size: 14px; outline: none; font-family: inherit;
    }
    .toolInput:focus { border-color: #1a6fc4; }
    .toolBtn {
      padding: 0 20px; height: 42px; border: none; border-radius: 8px;
      font-size: 13px; font-weight: 700; cursor: pointer; font-family: inherit;
      background: #1a6fc4; color: #fff; transition: background .15s;
    }
    .toolBtn:hover { background: #155a9e; }
    .toolBtn.secondary { background: #f0f3f8; color: #555; border: 1.5px solid #e0e6ef; }
    .toolBtn.secondary:hover { background: #e4e9f2; }

    /* Cards grid */
    .grid3 {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 20px;
      margin-bottom: 48px;
    }

    /* Module card */
    .moduleCard {
      background: #fff; border: 1px solid #e8edf4;
      border-radius: 14px; overflow: hidden;
      transition: transform .2s, box-shadow .2s;
    }
    .moduleCard:hover {
      transform: translateY(-4px);
      box-shadow: 0 12px 32px rgba(26,111,196,.12);
      border-color: #b8d4f0;
    }
    .moduleThumb {
      height: 160px; position: relative;
      display: flex; align-items: center; justify-content: center;
    }
    .moduleEmoji { font-size: 52px; }
    .moduleBadge {
      position: absolute; top: 10px; left: 10px;
      font-size: 11px; font-weight: 700; padding: 3px 11px;
      border-radius: 20px; color: #fff; text-transform: uppercase;
    }
    .moduleNum {
      position: absolute; bottom: 8px; right: 10px;
      background: rgba(0,0,0,.5); color: #fff;
      font-size: 11px; font-weight: 600; padding: 3px 10px;
      border-radius: 20px; backdrop-filter: blur(4px);
    }
    .moduleBody { padding: 16px 18px 18px; }
    .moduleTitle { font-size: 15px; font-weight: 700; color: #1a1a2e; margin-bottom: 6px; }
    .moduleMeta  { font-size: 12px; color: #9ca3af; margin-bottom: 14px; }
    .moduleBtn {
      display: block; width: 100%; text-align: center;
      background: #1a6fc4; color: #fff; border: none; border-radius: 8px;
      padding: 9px 0; font-size: 13px; font-weight: 600;
      text-decoration: none; transition: background .2s;
    }
    .moduleBtn:hover { background: #155a9e; }

    @media (max-width: 600px) {
      .grid3 { grid-template-columns: 1fr; }
      .toolRow { flex-direction: column; }
    }
  </style>
</head>
<body>

<header class="siteHeader">
  <div class="wrap headerRow">
    <a class="logoText" href="index.html">GeoGAT Akademiya</a>
    <nav class="nav">
      <a href="index.html">Bosh sahifa</a>
      <a class="active" href="courses.html">Kurslar</a>
      <a href="about.html">Fan haqida</a>
      <a href="login.html">Kirish</a>
    </nav>
  </div>
</header>

<main class="wrap">

  <section class="pageHead">
    <h1>Kurslar katalogi — 6 modul</h1>
    <p>
      Har bir modul ichida: Kirish → Nazariya → Video → Slayd → Amaliy topshiriq → Yakun.
      Modulni tanlang va ichiga kiring.
    </p>
  </section>

  <section class="toolRow">
    <input id="courseSearch" class="toolInput"
           placeholder="Modul qidirish: masalan 'GIS' yoki 'Topografiya'..."
           oninput="filterModules()" />
    <button class="toolBtn" onclick="filterModules()">🔍 Qidirish</button>
    <button class="toolBtn secondary" onclick="resetModules()">✕ Tozalash</button>
  </section>

  <section class="grid3" id="modulesGrid">
    <!-- app.js to'ldiradi -->
    <div style="grid-column:1/-1;text-align:center;padding:40px;color:#aaa">⏳ Yuklanmoqda...</div>
  </section>

</main>

<footer class="siteFooter">
  © <span id="y"></span> GeoGAT Akademiya
</footer>

<script type="module" src="js/app.js"></script>
<script>
  // app.js module load bo'lgandan keyin ishga tushadi
  window.addEventListener("load", () => {
    setTimeout(() => {
      if (typeof window.renderModules === "function") {
        window.renderModules();
      }
    }, 150);
  });

  function filterModules() {
    const q = document.getElementById("courseSearch").value.trim();
    if (typeof window.renderModules === "function") window.renderModules(q);
  }
  function resetModules() {
    document.getElementById("courseSearch").value = "";
    if (typeof window.renderModules === "function") window.renderModules("");
  }
</script>

</body>
</html>
